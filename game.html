<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #faf8ef; font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { font-size: 60px; font-weight: bold; color: #776e65; margin-bottom: 10px; }
  .scores { display: flex; gap: 10px; margin-bottom: 20px; }
  .score-box { background: #bbada0; border-radius: 4px; padding: 10px 20px; text-align: center; color: white; min-width: 80px; }
  .score-box .label { font-size: 12px; text-transform: uppercase; font-weight: bold; }
  .score-box .value { font-size: 22px; font-weight: bold; }
  #game-container { position: relative; }
  #grid-container { background: #bbada0; border-radius: 6px; padding: 10px; display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); gap: 10px; }
  .grid-cell { background: rgba(238,228,218,0.35); border-radius: 4px; }
  #tile-container { position: absolute; top: 10px; left: 10px; }
  .tile { position: absolute; width: 100px; height: 100px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; transition: transform 0.1s ease, opacity 0.1s ease; }
  .tile-2    { background: #eee4da; color: #776e65; }
  .tile-4    { background: #ede0c8; color: #776e65; }
  .tile-8    { background: #f2b179; color: #f9f6f2; }
  .tile-16   { background: #f59563; color: #f9f6f2; }
  .tile-32   { background: #f67c5f; color: #f9f6f2; }
  .tile-64   { background: #f65e3b; color: #f9f6f2; }
  .tile-128  { background: #edcf72; color: #f9f6f2; font-size: 28px; }
  .tile-256  { background: #edcc61; color: #f9f6f2; font-size: 28px; }
  .tile-512  { background: #edc850; color: #f9f6f2; font-size: 28px; }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 22px; }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 22px; }
  .tile-super{ background: #3c3a32; color: #f9f6f2; font-size: 18px; }
  #message { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(238,228,218,0.73); border-radius: 6px; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 10; }
  #message.show { display: flex; }
  #message h2 { font-size: 48px; font-weight: bold; color: #776e65; }
  button { background: #8f7a66; color: #f9f6f2; border: none; border-radius: 4px; padding: 10px 20px; font-size: 16px; cursor: pointer; font-weight: bold; }
  button:hover { background: #9f8a76; }
  .controls { margin-top: 20px; color: #776e65; font-size: 14px; }
</style>
</head>
<body>
<h1>2048</h1>
<div class="scores">
  <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>
<button onclick="newGame()" style="margin-bottom:16px;">New Game</button>
<div id="game-container">
  <div id="grid-container">
    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
  </div>
  <div id="tile-container"></div>
  <div id="message">
    <h2 id="message-text">Game Over!</h2>
    <button onclick="newGame()">Try Again</button>
  </div>
</div>
<div class="controls">Use arrow keys or WASD to play</div>

<script>
const CELL_SIZE = 100;
const CELL_GAP = 10;

let board = [];
let score = 0;
let best = 0;
let gameOver = false;
let won = false;
let moveCount = 0;

function newGame() {
  board = Array.from({length: 4}, () => Array(4).fill(0));
  score = 0;
  gameOver = false;
  won = false;
  moveCount = 0;
  addRandomTile();
  addRandomTile();
  render();
}

function addRandomTile() {
  const empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (board[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function compress(row) {
  const filtered = row.filter(x => x !== 0);
  const result = [];
  let merged = false;
  let gained = 0;
  for (let i = 0; i < filtered.length; i++) {
    if (!merged && i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
      result.push(filtered[i] * 2);
      gained += filtered[i] * 2;
      i++;
      merged = false;
    } else {
      result.push(filtered[i]);
      merged = false;
    }
  }
  while (result.length < 4) result.push(0);
  return { row: result, gained };
}

function move(direction) {
  if (gameOver) return false;
  let moved = false;
  let gained = 0;

  if (direction === 'left') {
    for (let r = 0; r < 4; r++) {
      const { row, gained: g } = compress(board[r]);
      if (row.join() !== board[r].join()) moved = true;
      board[r] = row;
      gained += g;
    }
  } else if (direction === 'right') {
    for (let r = 0; r < 4; r++) {
      const rev = [...board[r]].reverse();
      const { row, gained: g } = compress(rev);
      row.reverse();
      if (row.join() !== board[r].join()) moved = true;
      board[r] = row;
      gained += g;
    }
  } else if (direction === 'up') {
    for (let c = 0; c < 4; c++) {
      const col = board.map(r => r[c]);
      const { row, gained: g } = compress(col);
      if (row.join() !== col.join()) moved = true;
      for (let r = 0; r < 4; r++) board[r][c] = row[r];
      gained += g;
    }
  } else if (direction === 'down') {
    for (let c = 0; c < 4; c++) {
      const col = board.map(r => r[c]).reverse();
      const { row, gained: g } = compress(col);
      row.reverse();
      if (row.join() !== col.reverse().join()) moved = true;
      for (let r = 0; r < 4; r++) board[r][c] = row[r];
      gained += g;
    }
  }

  if (moved) {
    score += gained;
    if (score > best) best = score;
    moveCount++;
    addRandomTile();
    checkGameState();
    render();
  }
  return moved;
}

function checkGameState() {
  // Check win
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (board[r][c] === 2048) won = true;

  // Check if moves remain
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (board[r][c] === 0) return;
      if (r + 1 < 4 && board[r][c] === board[r+1][c]) return;
      if (c + 1 < 4 && board[r][c] === board[r][c+1]) return;
    }
  gameOver = true;
}

function getMaxTile() {
  let max = 0;
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (board[r][c] > max) max = board[r][c];
  return max;
}

function render() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;

  const container = document.getElementById('tile-container');
  container.innerHTML = '';

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (board[r][c] === 0) continue;
      const tile = document.createElement('div');
      const val = board[r][c];
      tile.className = 'tile ' + (val <= 2048 ? `tile-${val}` : 'tile-super');
      tile.textContent = val;
      tile.style.left = (c * (CELL_SIZE + CELL_GAP)) + 'px';
      tile.style.top = (r * (CELL_SIZE + CELL_GAP)) + 'px';
      container.appendChild(tile);
    }
  }

  const msg = document.getElementById('message');
  if (gameOver) {
    document.getElementById('message-text').textContent = 'Game Over!';
    msg.className = 'show';
  } else if (won) {
    document.getElementById('message-text').textContent = 'You Win! 🎉';
    msg.className = 'show';
  } else {
    msg.className = '';
  }
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
  const map = {
    'ArrowLeft': 'left', 'ArrowRight': 'right',
    'ArrowUp': 'up', 'ArrowDown': 'down',
    'a': 'left', 'd': 'right', 'w': 'up', 's': 'down',
  };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
  }
});

// Expose API for Playwright
window.getBoard = () => board.map(r => [...r]);
window.getScore = () => score;
window.getMoveCount = () => moveCount;
window.getMaxTile = getMaxTile;
window.isGameOver = () => gameOver;
window.isWon = () => won;
window.makeMove = (dir) => move(dir);
window.newGame = newGame;

// Start game
newGame();
</script>
</body>
</html>
