apiVersion: v1
kind: Namespace
metadata:
  name: pw2048
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pw2048-stable
  namespace: pw2048
  labels: {app: pw2048, track: stable}
spec:
  replicas: 2
  selector:
    matchLabels: {app: pw2048, track: stable}
  template:
    metadata:
      labels: {app: pw2048, track: stable}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8080", prometheus.io/path: /metrics}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/alanthssss/pw2048:stable
          imagePullPolicy: IfNotPresent
          env:
            - {name: RELEASE_TRACK, value: stable}
            - {name: MODEL_NAME, value: greedy}
            - {name: MODEL_VERSION, value: v1}
          ports: [{name: http, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /readyz, port: http}, initialDelaySeconds: 2, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          lifecycle: {preStop: {exec: {command: ["/bin/sh", "-c", "sleep 5"]}}}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pw2048-canary
  namespace: pw2048
  labels: {app: pw2048, track: canary}
spec:
  replicas: 1
  selector:
    matchLabels: {app: pw2048, track: canary}
  template:
    metadata:
      labels: {app: pw2048, track: canary}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8080", prometheus.io/path: /metrics}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/alanthssss/pw2048:canary
          imagePullPolicy: Always
          env:
            - {name: RELEASE_TRACK, value: canary}
            - {name: MODEL_NAME, value: heuristic}
            - {name: MODEL_VERSION, value: v2}
          ports: [{name: http, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /readyz, port: http}, initialDelaySeconds: 2, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          lifecycle: {preStop: {exec: {command: ["/bin/sh", "-c", "sleep 5"]}}}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata: {name: pw2048-stable, namespace: pw2048}
spec:
  selector: {app: pw2048, track: stable}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: pw2048-canary, namespace: pw2048}
spec:
  selector: {app: pw2048, track: canary}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pw2048-stable
  namespace: pw2048
spec:
  ingressClassName: nginx
  rules:
    - host: pw2048.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: pw2048-stable, port: {number: 80}}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pw2048-canary
  namespace: pw2048
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "0"
    nginx.ingress.kubernetes.io/canary-by-cookie: "pw2048_canary"
spec:
  ingressClassName: nginx
  rules:
    - host: pw2048.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: pw2048-canary, port: {number: 80}}}
