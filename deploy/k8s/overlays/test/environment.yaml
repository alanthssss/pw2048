apiVersion: v1
kind: Namespace
metadata: {name: pw2048}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: pw2048-stable}
spec: {rules: [{host: test.pw2048.local, http: {paths: [{path: /, pathType: Prefix, backend: {service: {name: pw2048-stable, port: {number: 80}}}}]}}]}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: pw2048-canary}
spec: {rules: [{host: test.pw2048.local, http: {paths: [{path: /, pathType: Prefix, backend: {service: {name: pw2048-canary, port: {number: 80}}}}]}}]}
